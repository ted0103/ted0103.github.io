name: Deploy The Celestial Archive

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare release site
        run: |
          curl -fsSL -o app.zip https://github.com/ted0103/celestial-archive/releases/download/v0.2.0/celestial-archive-friend-preview-v0.2.0.zip
          mkdir site
          unzip -q app.zip -d site
          curl -fsSL -o site/download.html https://raw.githubusercontent.com/ted0103/celestial-archive/main/download.html
          sed -i 's/Friend Preview 01/Friend Preview 02/g; s/v0\.1\.0/v0.2.0/g' site/download.html
          touch site/.nojekyll
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Package Pages artifact
        run: tar --dereference --hard-dereference --directory site -cvf "$RUNNER_TEMP/artifact.tar" --exclude=.git --exclude=.github .
      - name: Upload Pages artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
