name: Deploy The Celestial Archive

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare release site
        run: |
          curl -fsSL -o app.zip https://github.com/ted0103/celestial-archive/releases/download/v0.2.0/celestial-archive-friend-preview-v0.2.0.zip
          mkdir site
          unzip -q app.zip -d site
          curl -fsSL -o site/download.html https://raw.githubusercontent.com/ted0103/celestial-archive/main/download.html
          sed -i 's/Friend Preview 01/Friend Preview 02/g; s/v0\.1\.0/v0.2.0/g' site/download.html
          touch site/.nojekyll
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
          include-hidden-files: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
